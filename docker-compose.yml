version: '3.8'

services:
  evidence-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_CONTRACT_ADDRESS=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - REACT_APP_IPFS_BASE_URL=https://ipfs.io/ipfs/

  ipfs-node:
    image: ipfs/go-ipfs:latest
    ports:
      - "4001:4001"
      - "8081:8080"
      - "5001:5001"

